name: generate-cards

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/generate-cards.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Commit cards
        run: |
          git config user.name "robo-pets-bot"
          git config user.email "bot@users.noreply.github.com"
          git add cards
          if ! git diff --cached --quiet; then
            git commit -m "feat: robo-pet card images (Gemini)"
            git pull --rebase
            git push
          fi
