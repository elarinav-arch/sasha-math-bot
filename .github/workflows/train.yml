name: training

on:
  # GitHub Actions cron — best-effort: на практике срабатывает не по заданной частоте,
  # а редко и нерегулярно (иногда раз в 1–3 часа, в произвольную минуту, а не по сетке
  # */10). Поэтому опрашиваем часто с запасом, а бот сам решает по кипрскому времени,
  # в каком из ТРЁХ СПЛОШНЫХ (без промежутков) окон он сейчас находится, и не запускал
  # ли он уже это окно сегодня. Раз окна сплошные — любое срабатывание в течение дня
  # попадёт хоть в какое-то окно, а не потеряется в промежутке между ними.
  schedule:
    - cron: "*/10 11-19 * * *" # 14:00–22:50 Кипр (UTC+3 летом) — покрывает все окна с запасом
  workflow_dispatch:
    inputs:
      slot:
        description: "morning | midday | evening (принудительный запуск, игнорирует окно и дедуп)"
        required: false

concurrency: training

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHILD_CHAT_ID: ${{ secrets.CHILD_CHAT_ID }}
          PARENT_CHAT_ID: ${{ secrets.PARENT_CHAT_ID }}
          SESSION_SLOT: ${{ github.event.inputs.slot }}
      - name: Commit progress
        run: |
          git config user.name "robo-pets-bot"
          git config user.email "bot@users.noreply.github.com"
          git add progress.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: progress $(date -u +%FT%H:%M)"
            git pull --rebase
            git push
          fi
