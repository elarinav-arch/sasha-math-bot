name: training

on:
  schedule:
    - cron: "0 11 * * *" # 14:00 Кипр (UTC+3 летом) — первая тренировка
    - cron: "0 14 * * *" # 17:00 Кипр — вторая
    - cron: "0 16 * * *" # 19:00 Кипр — последняя, тут подводим итоги дня
  workflow_dispatch:
    inputs:
      slot:
        description: "morning | midday | evening"
        required: false

concurrency: training

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Determine slot
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "value=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 11 * * *") echo "value=morning" >> "$GITHUB_OUTPUT" ;;
              "0 14 * * *") echo "value=midday" >> "$GITHUB_OUTPUT" ;;
              "0 16 * * *") echo "value=evening" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHILD_CHAT_ID: ${{ secrets.CHILD_CHAT_ID }}
          PARENT_CHAT_ID: ${{ secrets.PARENT_CHAT_ID }}
          SESSION_SLOT: ${{ steps.slot.outputs.value }}
      - name: Commit progress
        run: |
          git config user.name "robo-pets-bot"
          git config user.email "bot@users.noreply.github.com"
          git add progress.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: progress $(date -u +%FT%H:%M)"
            git pull --rebase
            git push
          fi
