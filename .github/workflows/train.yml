name: training

on:
  # GitHub Actions cron — best-effort и может пропускать тики (особенно у нечасто
  # используемых публичных репозиториев). Поэтому опрашиваем часто: бот сам решает
  # по кипрскому времени, открыто ли сейчас окно тренировки, и не запускал ли он
  # его уже сегодня. Если один тик пропущен — сработает следующий через 10 минут,
  # всё ещё внутри часового окна.
  schedule:
    - cron: "*/10 10-17 * * *" # 13:00–20:50 Кипр (UTC+3 летом), с запасом вокруг окон 14:00/17:00/19:00
  workflow_dispatch:
    inputs:
      slot:
        description: "morning | midday | evening (принудительный запуск, игнорирует окно и дедуп)"
        required: false

concurrency: training

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHILD_CHAT_ID: ${{ secrets.CHILD_CHAT_ID }}
          PARENT_CHAT_ID: ${{ secrets.PARENT_CHAT_ID }}
          SESSION_SLOT: ${{ github.event.inputs.slot }}
      - name: Commit progress
        run: |
          git config user.name "robo-pets-bot"
          git config user.email "bot@users.noreply.github.com"
          git add progress.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: progress $(date -u +%FT%H:%M)"
            git pull --rebase
            git push
          fi
